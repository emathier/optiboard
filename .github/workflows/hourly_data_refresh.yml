name: Hourly Data Refresh

on:
  schedule:
    - cron: '43 * * * *' # Runs every hour on the hour
  workflow_dispatch:      # Allows manual trigger from the GitHub Actions UI

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Crucial for allowing the bot to push commits back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          cache: true

      - name: Write GCP Credentials
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "$GCP_SA_KEY" ]; then
            echo "Error: The GCP_SA_KEY secret is not configured in your repository secrets!" >&2
            exit 1
          fi
          echo "$GCP_SA_KEY" > creds.json

      - name: Run Data Refresh Pipeline
        run: |
          pixi run python smartUpdate.py

      - name: Clean up Credentials
        if: always()
        run: rm -f creds.json

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Stage the updated Parquet databases and the serialized model
          git add data-files/*.parquet model_v1/model1.pkl
          
          # Check if there are actual updates to commit
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "chore: hourly data refresh - $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
            git push
          else
            echo "No changes in data files detected."
          fi
